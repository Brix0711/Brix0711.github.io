
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PastryCalc Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}

:root{
--cream:#f7fbf8;
--warm-white:#ffffff;
--green-dark:#1f3d2b;
--green:#2e7d5b;
--green-light:#6bbf8f;
--accent:#3aa76d;
--border:#d9e7df;
--text:#1f3d2b;
--muted:#6b8f7d;
--shadow:0 8px 30px rgba(0,0,0,.05);
--radius:12px;
}

body{
font-family:'DM Sans',sans-serif;
background:var(--cream);
color:var(--text);
}

.topbar{
height:64px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 24px;
background:white;
border-bottom:1px solid var(--border);
position:sticky;
top:0;
}

.brand{
display:flex;
align-items:center;
gap:10px;
font-weight:700;
font-family:'Playfair Display',serif;
font-size:18px;
}

.brand-icon{
font-size:26px;
}

.nav-tabs{
display:flex;
gap:6px;
}

.nav-tab{
border:none;
background:none;
padding:8px 14px;
border-radius:8px;
cursor:pointer;
font-weight:600;
color:var(--muted);
}

.nav-tab.active{
background:var(--green);
color:white;
}

.main{
max-width:1200px;
margin:auto;
padding:26px;
}

.grid-4{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:16px;
}

.card{
background:white;
border-radius:var(--radius);
border:1px solid var(--border);
padding:18px;
box-shadow:var(--shadow);
}

.stat-val{
font-size:22px;
font-weight:700;
margin-top:4px;
}

.section-title{
font-size:24px;
font-family:'Playfair Display',serif;
font-weight:700;
}

input{
padding:8px;
border:1px solid var(--border);
border-radius:8px;
width:100%;
}

.batch-row{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 0;
border-bottom:1px solid var(--border);
font-size:14px;
}

.badge{
padding:4px 10px;
border-radius:20px;
font-size:11px;
background:#e6f4ec;
color:var(--green);
font-weight:600;
}

canvas{
margin-top:10px;
}

button{
cursor:pointer;
}

.btn{
background:var(--green);
color:white;
border:none;
padding:8px 14px;
border-radius:8px;
font-weight:600;
}

.search{
margin:10px 0 14px;
}

@media(max-width:900px){
.grid-4{grid-template-columns:1fr 1fr}
}
</style>
</head>

<body>

<div class="topbar">

<div class="brand">
<div class="brand-icon">🍪</div>
<div>PastryCalc Pro</div>
</div>

<div class="nav-tabs">
<button class="nav-tab active" onclick="showPage('dashboard')">Dashboard</button>
<button class="nav-tab" onclick="showPage('ingredients')">Inventory</button>
<button class="nav-tab" onclick="showPage('batches')">Batches</button>
<button class="nav-tab" onclick="showPage('sales')">Sales</button>
</div>

</div>


<div class="main">

<div id="page-dashboard">

<div class="section-title">Bakery Overview</div>

<div class="grid-4" style="margin:20px 0">

<div class="card">
<div>Ingredients</div>
<div class="stat-val" id="d-ingr">0</div>
</div>

<div class="card">
<div>Batches</div>
<div class="stat-val" id="d-batch">0</div>
</div>

<div class="card">
<div>Total Revenue</div>
<div class="stat-val" id="d-revenue">₱0</div>
</div>

<div class="card">
<div>Total Profit</div>
<div class="stat-val" id="d-profit">₱0</div>
</div>

</div>

<div class="card">

<div style="display:flex;justify-content:space-between;align-items:center">
<div style="font-weight:700">Recent Batches</div>
</div>

<input class="search" id="batchSearch" placeholder="Search batch..." oninput="renderDashboard()">

<div id="recentBatches"></div>

</div>


<div class="card" style="margin-top:20px">

<div style="font-weight:700">Profit Chart</div>

<canvas id="profitChart" height="120"></canvas>

</div>


</div>

</div>


<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

const DB={
load(k,d=[]){try{return JSON.parse(localStorage.getItem(k))||d}catch{return d}},
save(k,v){localStorage.setItem(k,JSON.stringify(v))}
}

let ingredients=DB.load("ingredients")
let batches=DB.load("batches")
let sales=DB.load("sales")

function showPage(){}

function renderDashboard(){

document.getElementById("d-ingr").textContent=ingredients.length
document.getElementById("d-batch").textContent=batches.length

let revenue=sales.reduce((a,b)=>a+b.revenue,0)
let profit=sales.reduce((a,b)=>a+b.profit,0)

document.getElementById("d-revenue").textContent="₱"+revenue.toFixed(2)
document.getElementById("d-profit").textContent="₱"+profit.toFixed(2)

let search=document.getElementById("batchSearch").value.toLowerCase()

let list=batches
.filter(b=>b.name.toLowerCase().includes(search))
.reverse()
.slice(0,5)

let html=""

list.forEach(b=>{

let price=(b.totalCost/b.yield)||0

html+=`
<div class="batch-row">
<div>
<div style="font-weight:600">${b.name}</div>
<div style="font-size:12px;color:#888">
${b.date} • ${b.yield} pcs • ₱${price.toFixed(2)} / piece
</div>
</div>
<div class="badge">₱${b.totalCost.toFixed(2)}</div>
</div>
`
})

if(!html) html="<div style='padding:10px;color:#888'>No batches yet</div>"

document.getElementById("recentBatches").innerHTML=html

renderChart()
}

function renderChart(){

let labels=sales.map(s=>s.batchName)
let profits=sales.map(s=>s.profit)

const ctx=document.getElementById('profitChart')

if(window.chart) window.chart.destroy()

window.chart=new Chart(ctx,{
type:'bar',
data:{
labels:labels,
datasets:[{
label:'Profit',
data:profits
}]
},
options:{
responsive:true,
plugins:{legend:{display:false}}
}
})

}

renderDashboard()

</script>

</body>
</html>
